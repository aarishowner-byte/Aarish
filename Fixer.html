<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bhallu Database · User List</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0f1f;
            font-family: 'Segoe UI', 'Fira Code', monospace;
            padding: 20px;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .container {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        h1 {
            font-size: 1.6rem;
            background: linear-gradient(135deg, #facc15, #f97316);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 4px;
        }
        .sub {
            color: #94a3b8;
            margin-bottom: 12px;
            font-size: 0.75rem;
        }
        .controls {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 48px;
            padding: 10px 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-bottom: 16px;
            flex-shrink: 0;
        }
        .url-group {
            flex: 2;
            min-width: 180px;
        }
        .url-group label {
            font-size: 0.65rem;
            color: #94a3b8;
            display: block;
        }
        input {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 40px;
            padding: 6px 12px;
            color: white;
            font-size: 0.75rem;
            width: 100%;
        }
        .search-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .search-group input {
            width: 160px;
        }
        button {
            background: #3b82f6;
            border: none;
            padding: 5px 12px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            font-size: 0.7rem;
        }
        .show-data-btn { background: #10b981; }
        .data-container {
            background: #0f172a;
            border: 1px solid #2d3a5e;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }
        .data-header {
            background: #1e293b;
            padding: 6px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            flex-shrink: 0;
            font-size: 0.7rem;
        }
        .stats {
            color: #facc15;
        }
        .user-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px 0;
        }
        .user-list::-webkit-scrollbar { width: 10px; }
        .user-list::-webkit-scrollbar-track { background: #1e293b; border-radius: 10px; }
        .user-list::-webkit-scrollbar-thumb { background: #facc15; border-radius: 10px; }
        /* Single line row: phone and password side by side */
        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px;
            border-bottom: 1px solid #1e2a3e;
            font-size: 0.85rem;
            gap: 20px;
            cursor: pointer;
            transition: background 0.1s;
        }
        .phone-number {
            color: #facc15;
            font-weight: 600;
            background: rgba(250,204,21,0.1);
            padding: 4px 12px;
            border-radius: 40px;
            flex: 1;
            text-align: left;
        }
        .password {
            color: #94a3b8;
            background: #1e293b;
            padding: 4px 12px;
            border-radius: 40px;
            flex: 1;
            text-align: right;
            font-family: monospace;
        }
        .user-item.highlight {
            background: #facc15;
        }
        .user-item.highlight .phone-number,
        .user-item.highlight .password {
            background: #facc15;
            color: #0f172a;
        }
        .empty, .loading, .error {
            text-align: center;
            padding: 30px;
            color: #94a3b8;
        }
        .error { color: #ff8888; }
        @media (max-width: 700px) {
            body { padding: 12px; }
            .user-item { flex-direction: row; gap: 10px; }
            .phone-number, .password { font-size: 0.7rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📂 Bhallu Database · User List</h1>
    <div class="sub">➡️ Phone (left) – Password (right) | Tap to copy individually</div>

    <div class="controls">
        <div class="url-group">
            <label>🔥 Firebase URL</label>
            <input type="text" id="displayUrl" value="https://bhallu-ki-gaad-default-rtdb.asia-southeast1.firebasedatabase.app/.json" readonly>
        </div>
        <div class="search-group">
            <input type="text" id="searchInput" placeholder="🔍 Find phone/pass">
            <button id="findBtn">Find</button>
            <button id="nextBtn">Next</button>
            <button id="clearBtn">Clear</button>
            <button id="refreshBtn">Refresh</button>
            <button id="showDataBtn" class="show-data-btn">📡 Show Data</button>
        </div>
    </div>

    <div class="data-container">
        <div class="data-header">
            <div class="stats" id="statsInfo">📊 Click "Show Data" to load</div>
            <button id="copyAllBtn" style="background:#475569;">📋 Copy all (phone:pass)</button>
        </div>
        <div id="userList" class="user-list">
            <div class="empty">✨ Press "Show Data"</div>
        </div>
    </div>
</div>

<script>
    // 🔥 Alpha DB URL (hidden)
    const ALPHA_URL = "https://alphaaxriajjc-default-rtdb.asia-southeast1.firebasedatabase.app/.json";

    let allUsers = [];
    let matches = [];
    let matchIndex = -1;
    let currentSearch = '';

    const userListDiv = document.getElementById('userList');
    const statsSpan = document.getElementById('statsInfo');
    const searchInput = document.getElementById('searchInput');
    const findBtn = document.getElementById('findBtn');
    const nextBtn = document.getElementById('nextBtn');
    const clearBtn = document.getElementById('clearBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const showDataBtn = document.getElementById('showDataBtn');
    const copyAllBtn = document.getElementById('copyAllBtn');

    // Copy using prompt (works everywhere)
    function copyText(text, label) {
        prompt(`📋 ${label} (Select and copy manually):\n\n`, text);
    }

    // Extract users recursively
    function extractUsers(obj, arr) {
        if (!obj || typeof obj !== 'object') return;
        if (obj.phone) {
            let phone = String(obj.phone);
            let pass = obj.password !== undefined ? String(obj.password) : '(no password)';
            arr.push({ phone, password: pass });
        }
        for (let val of Object.values(obj)) {
            extractUsers(val, arr);
        }
    }

    async function fetchData() {
        userListDiv.innerHTML = '<div class="loading">⏳ Fetching from Alpha database...</div>';
        statsSpan.innerText = '⏳ Loading...';
        try {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 20000);
            const res = await fetch(ALPHA_URL, { signal: controller.signal });
            clearTimeout(timeout);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            const users = [];
            extractUsers(data, users);
            const map = new Map();
            for (let u of users) map.set(u.phone, u);
            allUsers = Array.from(map.values()).sort((a,b) => a.phone.localeCompare(b.phone));
            renderList();
            statsSpan.innerText = `📞 ${allUsers.length} users loaded — tap to copy`;
            clearHighlight();
        } catch (err) {
            console.error(err);
            try {
                const fallbackRes = await fetch(ALPHA_URL);
                const raw = await fallbackRes.text();
                userListDiv.innerHTML = `<div class="error">❌ Error: ${err.message}<br><br>⚠️ Showing raw JSON instead:</div><pre style="margin:12px; padding:12px; background:#1e293b; border-radius:12px; overflow:auto; font-size:0.7rem;">${escapeHtml(raw.substring(0, 3000))}${raw.length>3000 ? '…' : ''}</pre>`;
            } catch(e2) {
                userListDiv.innerHTML = `<div class="error">❌ Failed to load data: ${err.message}<br><br>Check network or CORS.</div>`;
            }
            statsSpan.innerText = '❌ Failed';
            allUsers = [];
        }
    }

    function renderList() {
        if (!allUsers.length) {
            userListDiv.innerHTML = '<div class="empty">No users found. Try "Show Data".</div>';
            return;
        }
        const frag = document.createDocumentFragment();
        for (let i = 0; i < allUsers.length; i++) {
            const u = allUsers[i];
            const div = document.createElement('div');
            div.className = 'user-item';
            div.setAttribute('data-idx', i);
            div.innerHTML = `
                <div class="phone-number" data-phone="${escapeHtml(u.phone)}">📞 ${escapeHtml(u.phone)}</div>
                <div class="password" data-pass="${escapeHtml(u.password)}">🔑 ${escapeHtml(u.password)}</div>
            `;
            div.querySelector('.phone-number').onclick = (e) => {
                e.stopPropagation();
                copyText(u.phone, 'Phone Number');
            };
            div.querySelector('.password').onclick = (e) => {
                e.stopPropagation();
                copyText(u.password, 'Password');
            };
            frag.appendChild(div);
        }
        userListDiv.innerHTML = '';
        userListDiv.appendChild(frag);
    }

    function clearHighlight() {
        document.querySelectorAll('.user-item').forEach(el => el.classList.remove('highlight'));
        matches = [];
        matchIndex = -1;
        currentSearch = '';
        statsSpan.innerText = `📞 ${allUsers.length} users`;
    }

    function findAndHighlight() {
        if (!allUsers.length) { alert('Load data first (Show Data)'); return; }
        const term = searchInput.value.trim();
        if (!term) { clearHighlight(); return; }
        if (term === currentSearch && matches.length) { goToNext(); return; }
        currentSearch = term;
        const lower = term.toLowerCase();
        matches = [];
        for (let i=0; i<allUsers.length; i++) {
            const u = allUsers[i];
            if (u.phone.includes(lower) || u.password.toLowerCase().includes(lower)) matches.push(i);
        }
        if (!matches.length) {
            statsSpan.innerText = `🔍 No match for "${term}"`;
            clearHighlight();
            return;
        }
        document.querySelectorAll('.user-item').forEach(el => el.classList.remove('highlight'));
        for (let idx of matches) {
            const el = userListDiv.querySelector(`.user-item[data-idx='${idx}']`);
            if (el) el.classList.add('highlight');
        }
        matchIndex = 0;
        scrollToMatch();
        statsSpan.innerText = `🔍 ${matches.length} matches — showing ${matchIndex+1}/${matches.length}`;
    }

    function scrollToMatch() {
        if (matchIndex < 0 || matchIndex >= matches.length) return;
        const idx = matches[matchIndex];
        const target = userListDiv.querySelector(`.user-item[data-idx='${idx}']`);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        statsSpan.innerText = `🔍 ${matches.length} matches — showing ${matchIndex+1}/${matches.length}`;
    }

    function goToNext() {
        if (!matches.length) { if (searchInput.value.trim()) findAndHighlight(); else statsSpan.innerText = `📞 ${allUsers.length} users`; return; }
        matchIndex = (matchIndex + 1) % matches.length;
        scrollToMatch();
    }

    function copyAll() {
        if (!allUsers.length) { alert('No data'); return; }
        const lines = allUsers.map(u => `${u.phone}:${u.password}`).join('\n');
        prompt('📋 Copy all (phone:password) — Select & copy manually:', lines);
    }

    showDataBtn.addEventListener('click', fetchData);
    refreshBtn.addEventListener('click', fetchData);
    findBtn.addEventListener('click', findAndHighlight);
    nextBtn.addEventListener('click', goToNext);
    clearBtn.addEventListener('click', () => { searchInput.value = ''; clearHighlight(); });
    copyAllBtn.addEventListener('click', copyAll);
    searchInput.addEventListener('keypress', e => { if (e.key === 'Enter') findAndHighlight(); });

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }
</script>
</body>
</html>
