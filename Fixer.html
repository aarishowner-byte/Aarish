<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bhallu Database · Home + Web</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0f1f;
            font-family: 'Segoe UI', 'Fira Code', monospace;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        /* Main Content - scrollable */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 80px;
        }
        .main-content::-webkit-scrollbar { width: 8px; }
        .main-content::-webkit-scrollbar-track { background: #1e293b; border-radius: 10px; }
        .main-content::-webkit-scrollbar-thumb { background: #facc15; border-radius: 10px; }
        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.6rem;
            background: linear-gradient(135deg, #facc15, #f97316);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 4px;
        }
        .sub {
            color: #94a3b8;
            margin-bottom: 16px;
            font-size: 0.75rem;
        }
        .controls {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 48px;
            padding: 10px 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-bottom: 16px;
        }
        .url-group {
            flex: 2;
            min-width: 180px;
        }
        .url-group label {
            font-size: 0.65rem;
            color: #94a3b8;
            display: block;
        }
        input {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 40px;
            padding: 6px 12px;
            color: white;
            font-size: 0.75rem;
            width: 100%;
        }
        .search-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .search-group input {
            width: 160px;
        }
        button {
            background: #3b82f6;
            border: none;
            padding: 5px 12px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            font-size: 0.7rem;
        }
        .show-data-btn { background: #10b981; }
        .data-container {
            background: #0f172a;
            border: 1px solid #2d3a5e;
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 16px;
        }
        .data-header {
            background: #1e293b;
            padding: 8px 16px;
            border-bottom: 1px solid #334155;
        }
        .stats {
            font-size: 0.8rem;
            color: #facc15;
        }
        .user-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .user-list::-webkit-scrollbar { width: 8px; }
        .user-list::-webkit-scrollbar-track { background: #1e293b; border-radius: 10px; }
        .user-list::-webkit-scrollbar-thumb { background: #facc15; border-radius: 10px; }
        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px;
            border-bottom: 1px solid #1e2a3e;
            font-size: 0.85rem;
            gap: 20px;
            cursor: pointer;
            transition: background 0.1s;
        }
        .phone-number {
            color: #facc15;
            font-weight: 600;
            background: rgba(250,204,21,0.1);
            padding: 4px 12px;
            border-radius: 40px;
            flex: 1;
            text-align: left;
        }
        .password {
            color: #94a3b8;
            background: #1e293b;
            padding: 4px 12px;
            border-radius: 40px;
            flex: 1;
            text-align: right;
            font-family: monospace;
        }
        .user-item.highlight {
            background: #facc15;
        }
        .user-item.highlight .phone-number,
        .user-item.highlight .password {
            background: #facc15;
            color: #0f172a;
        }
        .empty, .loading, .error {
            text-align: center;
            padding: 30px;
            color: #94a3b8;
        }
        .error { color: #ff8888; }
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: #facc15;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.7rem;
            z-index: 999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }
        /* Web View */
        .web-view {
            display: none;
            height: calc(100vh - 80px);
        }
        .web-view iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 20px;
            background: #fff;
        }
        /* Bottom Menu Bar - APK Style */
        .bottom-menu {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0f172a;
            border-top: 1px solid #334155;
            display: flex;
            justify-content: space-around;
            padding: 8px 20px;
            z-index: 100;
        }
        .bottom-menu .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: transparent;
            border: none;
            padding: 6px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            color: #94a3b8;
            font-size: 0.7rem;
        }
        .bottom-menu .menu-item.active {
            background: #facc15;
            color: #0f172a;
        }
        .bottom-menu .menu-item .icon {
            font-size: 1.2rem;
        }
        @media (max-width: 700px) {
            .main-content { padding: 12px; padding-bottom: 70px; }
            .user-item { flex-direction: row; gap: 10px; }
            .phone-number, .password { font-size: 0.7rem; }
            .bottom-menu .menu-item { padding: 4px 12px; }
        }
    </style>
</head>
<body>
    <!-- Main Content Area -->
    <div class="main-content" id="mainContent">
        <!-- Home View (Firebase User List) -->
        <div id="homeView" class="container">
            <h1>📂 Bhallu Database · User List</h1>
            <div class="sub">Tap phone → copy number | Tap password → copy password</div>

            <div class="controls">
                <div class="url-group">
                    <label>🔥 Firebase URL</label>
                    <input type="text" id="displayUrl" value="https://bhallu-ki-gaad-default-rtdb.asia-southeast1.firebasedatabase.app/.json" readonly>
                </div>
                <div class="search-group">
                    <input type="text" id="searchInput" placeholder="🔍 Find phone/pass">
                    <button id="findBtn">Find</button>
                    <button id="nextBtn">Next</button>
                    <button id="clearBtn">Clear</button>
                    <button id="refreshBtn">Refresh</button>
                    <button id="showDataBtn" class="show-data-btn">📡 Show Data</button>
                </div>
            </div>

            <div class="data-container">
                <div class="data-header">
                    <div class="stats" id="statsInfo">📊 Click "Show Data" to load</div>
                </div>
                <div id="userList" class="user-list">
                    <div class="empty">✨ Press "Show Data"</div>
                </div>
            </div>
        </div>

        <!-- Web View (YaarWin iframe) -->
        <div id="webView" class="web-view">
            <iframe id="yaarwinFrame" src="https://yaarwin.xyz/#/login" title="YaarWin Login" allow="clipboard-read; clipboard-write"></iframe>
        </div>
    </div>

    <div id="toastMsg" class="toast"></div>

    <!-- Bottom Menu Bar -->
    <div class="bottom-menu">
        <button id="homeMenuBtn" class="menu-item active">
            <span class="icon">🏠</span>
            <span>Home</span>
        </button>
        <button id="webMenuBtn" class="menu-item">
            <span class="icon">🌐</span>
            <span>Web</span>
        </button>
    </div>

<script>
    // 🔥 Alpha DB URL (hidden)
    const ALPHA_URL = "https://alphaaxriajjc-default-rtdb.asia-southeast1.firebasedatabase.app/.json";

    let allUsers = [];
    let matches = [];
    let matchIndex = -1;
    let currentSearch = '';

    const userListDiv = document.getElementById('userList');
    const statsSpan = document.getElementById('statsInfo');
    const searchInput = document.getElementById('searchInput');
    const findBtn = document.getElementById('findBtn');
    const nextBtn = document.getElementById('nextBtn');
    const clearBtn = document.getElementById('clearBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const showDataBtn = document.getElementById('showDataBtn');
    const toast = document.getElementById('toastMsg');
    const homeView = document.getElementById('homeView');
    const webView = document.getElementById('webView');
    const homeMenuBtn = document.getElementById('homeMenuBtn');
    const webMenuBtn = document.getElementById('webMenuBtn');

    // Tab switching
    function showHome() {
        homeView.style.display = 'block';
        webView.style.display = 'none';
        homeMenuBtn.classList.add('active');
        webMenuBtn.classList.remove('active');
    }

    function showWeb() {
        homeView.style.display = 'none';
        webView.style.display = 'block';
        webMenuBtn.classList.add('active');
        homeMenuBtn.classList.remove('active');
    }

    homeMenuBtn.addEventListener('click', showHome);
    webMenuBtn.addEventListener('click', showWeb);

    function showToast(msg, isError = false) {
        toast.textContent = msg;
        toast.style.backgroundColor = isError ? '#b91c1c' : '#1e293b';
        toast.style.opacity = '1';
        setTimeout(() => { toast.style.opacity = '0'; }, 1500);
    }

    async function copyText(text, label) {
        try {
            await navigator.clipboard.writeText(text);
            showToast(`✅ ${label} copied: ${text.substring(0, 20)}${text.length > 20 ? '…' : ''}`);
        } catch (err) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            showToast(`📋 ${label} copied`, false);
        }
    }

    function extractUsers(obj, arr) {
        if (!obj || typeof obj !== 'object') return;
        if (obj.phone) {
            let phone = String(obj.phone);
            let pass = obj.password !== undefined ? String(obj.password) : '(no password)';
            arr.push({ phone, password: pass });
        }
        for (let val of Object.values(obj)) extractUsers(val, arr);
    }

    async function fetchData() {
        userListDiv.innerHTML = '<div class="loading">⏳ Fetching from Alpha database...</div>';
        statsSpan.innerText = '⏳ Loading...';
        try {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 20000);
            const res = await fetch(ALPHA_URL, { signal: controller.signal });
            clearTimeout(timeout);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            const users = [];
            extractUsers(data, users);
            const map = new Map();
            for (let u of users) map.set(u.phone, u);
            allUsers = Array.from(map.values()).sort((a,b) => a.phone.localeCompare(b.phone));
            renderList();
            statsSpan.innerText = `📞 ${allUsers.length} users loaded — tap to copy`;
            clearHighlight();
        } catch (err) {
            console.error(err);
            userListDiv.innerHTML = `<div class="error">❌ Error: ${err.message}<br>Check network/CORS.</div>`;
            statsSpan.innerText = '❌ Failed';
            allUsers = [];
        }
    }

    function renderList() {
        if (!allUsers.length) {
            userListDiv.innerHTML = '<div class="empty">No users found. Try "Show Data".</div>';
            return;
        }
        const frag = document.createDocumentFragment();
        for (let i = 0; i < allUsers.length; i++) {
            const u = allUsers[i];
            const div = document.createElement('div');
            div.className = 'user-item';
            div.setAttribute('data-idx', i);
            div.innerHTML = `
                <div class="phone-number">📞 ${escapeHtml(u.phone)}</div>
                <div class="password">🔑 ${escapeHtml(u.password)}</div>
            `;
            div.querySelector('.phone-number').onclick = (e) => {
                e.stopPropagation();
                copyText(u.phone, 'Phone');
            };
            div.querySelector('.password').onclick = (e) => {
                e.stopPropagation();
                copyText(u.password, 'Password');
            };
            frag.appendChild(div);
        }
        userListDiv.innerHTML = '';
        userListDiv.appendChild(frag);
    }

    function clearHighlight() {
        document.querySelectorAll('.user-item').forEach(el => el.classList.remove('highlight'));
        matches = [];
        matchIndex = -1;
        currentSearch = '';
        statsSpan.innerText = `📞 ${allUsers.length} users`;
    }

    function findAndHighlight() {
        if (!allUsers.length) { showToast('Load data first (Show Data)', true); return; }
        const term = searchInput.value.trim();
        if (!term) { clearHighlight(); return; }
        if (term === currentSearch && matches.length) { goToNext(); return; }
        currentSearch = term;
        const lower = term.toLowerCase();
        matches = [];
        for (let i=0; i<allUsers.length; i++) {
            const u = allUsers[i];
            if (u.phone.includes(lower) || u.password.toLowerCase().includes(lower)) matches.push(i);
        }
        if (!matches.length) {
            showToast(`No match for "${term}"`, true);
            clearHighlight();
            return;
        }
        document.querySelectorAll('.user-item').forEach(el => el.classList.remove('highlight'));
        for (let idx of matches) {
            const el = userListDiv.querySelector(`.user-item[data-idx='${idx}']`);
            if (el) el.classList.add('highlight');
        }
        matchIndex = 0;
        scrollToMatch();
        statsSpan.innerText = `🔍 ${matches.length} matches — showing ${matchIndex+1}/${matches.length}`;
    }

    function scrollToMatch() {
        if (matchIndex < 0 || matchIndex >= matches.length) return;
        const target = userListDiv.querySelector(`.user-item[data-idx='${matches[matchIndex]}']`);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        statsSpan.innerText = `🔍 ${matches.length} matches — showing ${matchIndex+1}/${matches.length}`;
    }

    function goToNext() {
        if (!matches.length) { if (searchInput.value.trim()) findAndHighlight(); else statsSpan.innerText = `📞 ${allUsers.length} users`; return; }
        matchIndex = (matchIndex + 1) % matches.length;
        scrollToMatch();
    }

    showDataBtn.addEventListener('click', fetchData);
    refreshBtn.addEventListener('click', fetchData);
    findBtn.addEventListener('click', findAndHighlight);
    nextBtn.addEventListener('click', goToNext);
    clearBtn.addEventListener('click', () => { searchInput.value = ''; clearHighlight(); });
    searchInput.addEventListener('keypress', e => { if (e.key === 'Enter') findAndHighlight(); });

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }

    // Auto-load on page open
    fetchData();
</script>
</body>
</html>
